        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f9d58 0%, #4285f4 100%);

        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 30px 20px;
        margin: 0;
    }
.container {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 20px;
        max-width: 700px;
        width: 100%;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; margin-bottom: 5px; }
    p.subtitle { text-align: center; opacity: 0.9; margin-bottom: 5px; font-weight: 500; }
    p.tp { text-align: center; opacity: 0.9; margin-bottom: 30px; font-size: 15px; }
    input[type="text"] {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        text-align: center;
        margin-bottom: 15px;
        box-sizing: border-box;
        color: #333;
    }
    button {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: #fbbc05;
        color: #333;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
    }
    button:hover { opacity: 0.9; }
.result {
        margin-top: 25px;
        padding: 25px;
        border-radius: 15px;
        display: none;
        text-align: center;
    }
.lulus { background: #0f9d58; }
.tidak-lulus { background: #db4437; }
.nilai-box {
        background: rgba(255,255,255,0.2);
        padding: 15px;
        border-radius: 10px;
        margin-top: 15px;
        font-size: 20px;
        font-weight: bold;
 }
.info { font-size: 14px; opacity: 0.8; text-align: center; margin-top: 20px; }
</style>

    <p id="error" style="color:#ffcccc; text-align:center; margin-top:15px;"></p>

function cekKelulusan() {
    const nisn = document.getElementById('nisn').value.trim();
    const resultDiv = document.getElementById('result');
    const errorP = document.getElementById('error');

    resultDiv.style.display = 'none';
    errorP.textContent = '';

    if (nisn.length!== 10) {
        errorP.textContent = 'NISN harus 10 digit angka.';
        return;
    }

    const siswa = dataSiswa[nisn];

    if (!siswa) {
        errorP.textContent = 'NISN tidak ditemukan. Cek lagi atau hubungi TU.';
        return;
    }

    document.getElementById('nama').textContent = `Nama: ${siswa.nama}`;
    document.getElementById('kelas').textContent = `Kelas: ${siswa.kelas}`;
    document.getElementById('nilai').textContent = siswa.nilai;

    if (siswa.status === "LULUS") {
        document.getElementById('status').textContent = 'SELAMAT! KAMU LULUS 🎉';
        resultDiv.className = 'result lulus';
    } else {
        document.getElementById('status').textContent = 'MOHON MAAF, BELUM LULUS';
        resultDiv.className = 'result tidak-lulus';
    }

    resultDiv.style.display = 'block';
}

document.getElementById('nisn').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') cekKelulusan();
});
