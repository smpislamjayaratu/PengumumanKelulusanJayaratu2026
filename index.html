    }
   .container {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 20px;
        max-width: 700px;
        width: 100%;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);

        z-index: 2;

    p.tp { text-align: center; opacity: 0.9; margin-bottom: 30px; font-size: 15px; }
    input[type="text"] {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        text-align: center;
        margin-bottom: 15px;
        box-sizing: border-box;
        color: #333;
    }
    button {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: #fbbc05;
        color: #333;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
    }
    button:hover { opacity: 0.9; transform: scale(1.02); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

   .loading {
        margin-top: 25px;
        text-align: center;
        display: none;
    }
   .loading-text {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 15px;
        animation: pulse 1.5s infinite;
        line-height: 1.5;
    }
   .spinner {
        border: 4px solid rgba(255,255,255,0.3);
        border-top: 4px solid #fbbc05;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
    }

   .result {
        margin-top: 25px;
        padding: 25px;
        border-radius: 15px;
        display: none;
        text-align: center;
        animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
   .lulus { background: #0f9d58; }
   .lulus-bersyarat { background: #fbbc05; color: #333; } /* WARNA KUNING BROH */
   .tidak-lulus { background: #db4437; }
   .nilai-box {

        border-radius: 10px;
        margin-top: 15px;
        font-size: 20px;

   .catatan-box {

   .info { font-size: 14px; opacity: 0.8; text-align: center; margin-top: 20px; }

   .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        background: #fbbc05;
        top: -10px;
        animation: confetti-fall 3s linear forwards;
        z-index: 1;
    }
    @keyframes confetti-fall {
        to {
            transform: translateY(100vh) rotate(720deg);
            opacity: 0;
        }

// ===== SETTING JAM BUKA KELULUSAN =====
const TANGGAL_BUKA = new Date('2026-06-02T18:00:00+07:00'); // Selasa, 2 Juni 2026 Jam 18.00 WIB
// ======================================

function playTegang() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.5);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 3);
    } catch(e) { console.log('Audio error:', e); }
}

function playLulus() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const times = [0, 0.1, 0.2, 0.3];
        const freqs = [523, 659, 784, 1046];
        times.forEach((time, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freqs[i];
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime + time);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + time + 0.3);
            osc.start(audioCtx.currentTime + time);
            osc.stop(audioCtx.currentTime + time + 0.3);
        });
    } catch(e) { console.log('Audio error:', e); }
}

function createConfetti() {
    const colors = ['#fbbc05', '#0f9d58', '#4285f4', '#db4437', '#ff6d00'];
    for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
        confetti.style.width = Math.random() * 8 + 5 + 'px';
        confetti.style.height = Math.random() * 8 + 5 + 'px';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
    }
}

async function cekKelulusan() {
    const nisn = document.getElementById('nisn').value.trim();
    const resultDiv = document.getElementById('result');
    const loadingDiv = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const errorP = document.getElementById('error');
    const btn = document.getElementById('btnCek');
    const catatanDiv = document.getElementById('catatan');

    resultDiv.style.display = 'none';
    catatanDiv.style.display = 'none';
    errorP.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Cek waktu server...';

    if (nisn.length!== 10) {
        errorP.textContent = 'NISN harus 10 digit angka.';
        btn.disabled = false;
        btn.textContent = 'Cek Hasil';
        return;
    }

    let waktuServer;
    try {
        const apis = [
            'https://worldtimeapi.org/api/timezone/Asia/Jakarta',
            'https://timeapi.io/api/Time/current/zone?timeZone=Asia/Jakarta'
        ];

        for (let url of apis) {
            try {
                const res = await fetch(url, {cache: 'no-store'});
                const data = await res.json();
                const waktuStr = data.datetime || data.dateTime;
                waktuServer = new Date(waktuStr);
                if (!isNaN(waktuServer)) break;
            } catch (e) {
                console.log('API gagal:', url, e);
                continue;
            }
        }

        if (!waktuServer || isNaN(waktuServer)) throw new Error('Semua API waktu mati');

    } catch (e) {
        console.log('ERROR TOTAL:', e);
        errorP.innerHTML = `
            ⏳ <b>AKSES DIKUNCI SEMENTARA</b><br>
            Server waktu lagi gangguan. Refresh 1 menit lagi.<br>
            <small>Demi keamanan, sistem nggak bisa dibuka kalo waktu nggak ke-cek.</small>
        `;
        btn.disabled = false;
        btn.textContent = 'Cek Hasil';
        return;
    }

    if (waktuServer.getTime() < TANGGAL_BUKA.getTime()) {
        const options = {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jakarta'
        };
        const waktuBuka = TANGGAL_BUKA.toLocaleDateString('id-ID', options) + ' WIB';
        const waktuServerStr = waktuServer.toLocaleTimeString('id-ID', { timeZone: 'Asia/Jakarta' });

        errorP.innerHTML = `
            ⏳ <b>BELUM WAKTUNYA DEK!</b><br>
            Akses dibuka: <b>${waktuBuka}</b><br><br>
            Waktu server sekarang: ${waktuServerStr} WIB<br>
            <small>Mundurin jam HP + matiin internet nggak mempan. Coba aja 😏</small>
        `;
        btn.disabled = false;
        btn.textContent = 'Cek Hasil';
        return;
    }

    const siswa = Object.entries(dataSiswa).find(([key]) => key === nisn);
    if (!siswa) {
        errorP.textContent = 'NISN tidak ditemukan. Silahkan Hubungi Operator Sekolah';
        btn.disabled = false;
        btn.textContent = 'Cek Hasil';
        return;
    }

    const data = siswa[1];
    const namaPanggilan = data.nama.split(' ')[0];

    loadingDiv.style.display = 'block';
    btn.textContent = 'Memproses...';
    playTegang();

    const semuaPaket = [
        [
            `Tenang ${namaPanggilan}... Jantung aman kan? Server lagi nyari nama kamu di tumpukan berkas...`,
            `Buset ${namaPanggilan}, berkas kamu tebel banget. Tunggu ya, admin lagi ngopi dulu biar kuat...`,
            `UDAH KETEMU ${namaPanggilan}! Tinggal print... Eh tintanya habis. Bentar isi dulu...`
        ],
        [
            `${namaPanggilan} udah wudhu belum? Server lagi istikharah dulu nih nentuin kamu lulus apa nggak...`,
            `Kata server: "${namaPanggilan} nilainya nanggung". Lagi dibulatkan ke atas atau ke bawah ya...`,
            `PLOT TWIST ${namaPanggilan}... Data kamu nyangkut di awan. Lagi manggil pawang hujan...`
        ],
        [
            `${namaPanggilan}... Ini data kelulusan kamu atau surat cinta? Kok adminnya baca lama banget...`,
            `Breaking News ${namaPanggilan}: Nilai kamu lagi dirapatin guru se-sekolah. Voting dulu...`,
            `Hasilnya udah di depan mata ${namaPanggilan}... Tapi disuruh iklan dulu 30 detik...`
        ]
    ];

    const paketTerpilih = semuaPaket[Math.floor(Math.random() * semuaPaket.length)];
    let detik = 60;
    loadingText.textContent = `${paketTerpilih[0]} ${detik} detik lagi`;

    const countdown = setInterval(() => {
        detik--;
        if (detik >= 41) {
            loadingText.textContent = `${paketTerpilih[0]} ${detik} detik lagi`;
        } else if (detik >= 21) {
            loadingText.textContent = `${paketTerpilih[1]} ${detik} detik lagi`;
        } else if (detik >= 6) {
            loadingText.textContent = `${paketTerpilih[2]} ${detik} detik lagi`;
        } else if (detik >= 0) {
            loadingText.textContent = `DETEKSI KERINGAT DINGIN ${namaPanggilan}! ${detik}...`;
        } else {
            clearInterval(countdown);
        }
    }, 1000);

    setTimeout(() => {
        clearInterval(countdown);
        loadingDiv.style.display = 'none';
        btn.disabled = false;
        btn.textContent = 'Cek Hasil';

        document.getElementById('nama').textContent = `Nama: ${data.nama}`;
        document.getElementById('kelas').textContent = `Kelas: ${data.kelas}`;
        document.getElementById('nilai').textContent = data.nilai;

        // NORMALISASI STATUS BIAR ANTI TYPO
        const statusNormal = data.status.trim().toUpperCase();

        if (statusNormal === "LULUS") {
            document.getElementById('status').textContent = 'SELAMAT! KAMU LULUS 🎉';
            resultDiv.className = 'result lulus';
            catatanDiv.innerHTML = '<b>Catatan:</b> Alhamdulillah. Silakan ambil SKL di TU mulai 3 Juni 2026.';
            catatanDiv.style.display = 'block';
            createConfetti();
            playLulus();
        }
        else if (statusNormal === "LULUS BERSYARAT") {
            document.getElementById('status').textContent = 'ANDA DINYATAKAN LULUS BERSYARAT ⚠️';
            resultDiv.className = 'result lulus-bersyarat';
            catatanDiv.innerHTML = '<b>Catatan Penting:</b> Siswa wajib menyelesaikan pembinaan/administrasi. Segera hubungi Wali Kelas 9 paling lambat 5 Juni 2026. Tetap semangat!';
            catatanDiv.style.display = 'block';
            createConfetti(); // TETEP KASIH CONFETTI BIAR SEMANGAT
            playLulus();
        }
        else {
            document.getElementById('status').textContent = 'MOHON MAAF, BELUM LULUS';
            resultDiv.className = 'result tidak-lulus';
            catatanDiv.innerHTML = '<b>Catatan:</b> Tetap semangat. Silakan hubungi BK untuk konsultasi langkah selanjutnya.';
            catatanDiv.style.display = 'block';
        }

        resultDiv.style.display = 'block';
    }, 60000);
}
document.getElementById('nisn').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') cekKelulusan();
});
