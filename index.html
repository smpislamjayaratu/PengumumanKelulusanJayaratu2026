.container {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 20px;
        max-width: 700px;
        width: 100%;

    input[type="text"] {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        text-align: center;
        margin-bottom: 15px;
        box-sizing: border-box;
        color: #333;
    }
    button {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: #fbbc05;
        color: #333;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
    }
    button:hover { opacity: 0.9; transform: scale(1.02); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.loading {
        margin-top: 25px;
        text-align: center;
        display: none;
    }
.loading-text {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 15px;
        animation: pulse 1.5s infinite;
        line-height: 1.5;
    }
.spinner {
        border: 4px solid rgba(255,255,255,0.3);
        border-top: 4px solid #fbbc05;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
    }

.result {
        margin-top: 25px;
        padding: 25px;
        border-radius: 15px;
        display: none;
        text-align: center;
        animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
.lulus { background: #0f9d58; }
.tidak-lulus { background: #db4437; }
.nilai-box {
        background: rgba(255,255,255,0.2);
        padding: 15px;
        border-radius: 10px;
        margin-top: 15px;
        font-size: 20px;
        font-weight: bold;
 }
.info { font-size: 14px; opacity: 0.8; text-align: center; margin-top: 20px; }

.confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        background: #fbbc05;
        top: -10px;
        animation: confetti-fall 3s linear forwards;
        z-index: 1;
    }
    @keyframes confetti-fall {
        to {

function playTegang() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.5);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 3);
    } catch(e) { console.log('Audio error:', e); }
}

function playLulus() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const times = [0, 0.1, 0.2, 0.3];
        const freqs = [523, 659, 784, 1046];
        times.forEach((time, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freqs[i];
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime + time);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + time + 0.3);
            osc.start(audioCtx.currentTime + time);
            osc.stop(audioCtx.currentTime + time + 0.3);
        });
    } catch(e) { console.log('Audio error:', e); }
}

function createConfetti() {
    const colors = ['#fbbc05', '#0f9d58', '#4285f4', '#db4437', '#ff6d00'];
    for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
        confetti.style.width = Math.random() * 8 + 5 + 'px';
        confetti.style.height = Math.random() * 8 + 5 + 'px';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
    }
}

function cekKelulusan() {
    const nisn = document.getElementById('nisn').value.trim();
    const resultDiv = document.getElementById('result');
    const loadingDiv = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const errorP = document.getElementById('error');
    const btn = document.getElementById('btnCek');

    resultDiv.style.display = 'none';
    errorP.textContent = '';

    if (nisn.length!== 10) {
        errorP.textContent = 'NISN harus 10 digit angka.';
        return;
    }

    const siswa = dataSiswa[nisn]; // FIX DISINI - WAJIB ADA [nisn]
    if (!siswa) {
        errorP.textContent = 'NISN tidak ditemukan. Silahkan Hubungi Bapak Yandi Sastria Syukrillah, SE., Gr';
        return;
    }

    const namaPanggilan = siswa.nama.split(' ')[0];
    const pesanLoading = [
        `Harap menunggu sebentar, sistem sedang obrak-abrik data kelulusan Ananda ${namaPanggilan}...`,
        `Sabar ya ${namaPanggilan}, server lagi buka berkas kamu nih...`,
        `Siapkan cemilan Ananda ${namaPanggilan} sembari menunggu hasil...`,
        `Jantung aman kan ${namaPanggilan}? Tunggu 3 detik ya...`
    ];
    loadingText.textContent = pesanLoading[Math.floor(Math.random() * pesanLoading.length)];

    loadingDiv.style.display = 'block';
    btn.disabled = true;
    btn.textContent = 'Memproses...';

    playTegang();

    setTimeout(() => {
        loadingDiv.style.display = 'none';
        btn.disabled = false;
        btn.textContent = 'Cek Hasil';

        document.getElementById('nama').textContent = `Nama: ${siswa.nama}`;
        document.getElementById('kelas').textContent = `Kelas: ${siswa.kelas}`;
        document.getElementById('nilai').textContent = siswa.nilai;

        if (siswa.status === "LULUS") {
            document.getElementById('status').textContent = 'SELAMAT! KAMU LULUS 🎉';
            resultDiv.className = 'result lulus';
            createConfetti();
            playLulus();
        } else {
            document.getElementById('status').textContent = 'MOHON MAAF, BELUM LULUS';
            resultDiv.className = 'result tidak-lulus';
        }

        resultDiv.style.display = 'block';
    }, 5000);
}

document.getElementById('nisn').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') cekKelulusan();
